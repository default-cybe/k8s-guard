# Hardened least-privilege Role  (Hardening Fix 2)
#
# Namespace-scoped Role allowing only get/list on pods in vuln-app. Replaces
# the cluster-admin grant. NSA/CISA Kubernetes Hardening Guide v1.2, Section 5:
# least-privilege RBAC.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vuln-sa-role
  namespace: vuln-app
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
