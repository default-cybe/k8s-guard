# vuln-sa ServiceAccount
#
# Every pod is assigned a service account, and Kubernetes mounts this
# account's JWT token at
#   /var/run/secrets/kubernetes.io/serviceaccount/token
# inside the pod. The webapp pod runs as `vuln-sa`. Because the token is
# auto-mounted and the LFI lets an attacker read arbitrary files, this token
# is what gets stolen in the attack chain.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vuln-sa
  namespace: vuln-app
