# webapp-svc NodePort service
#
# Port 30270 on VM2 (192.168.50.11) routes external traffic to the webapp pod.
# This is the entry point the attacker curls in Phase 1.
apiVersion: v1
kind: Service
metadata:
  name: webapp-svc
  namespace: vuln-app
spec:
  type: NodePort
  selector:
    app: webapp
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30270
