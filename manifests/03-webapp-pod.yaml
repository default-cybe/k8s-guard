# Vulnerable webapp pod  (Vulnerability 1: Local File Inclusion)
#
# "Internal Document Portal v2.1": a tiny inline Python HTTP server, no custom
# image needed (python:3.9-slim is pre-cached on VM2 for airgapped operation).
#   - Endpoints:  /  (HTML index)  and  /read?file=FILENAME
#   - /read?file= opens the file with open() and NO path validation (the LFI)
#   - Runs under the vuln-sa service account, whose token is auto-mounted
apiVersion: v1
kind: Pod
metadata:
  name: webapp
  namespace: vuln-app
  labels:
    app: webapp
spec:
  serviceAccountName: vuln-sa
  containers:
    - name: webapp
      image: python:3.9-slim
      imagePullPolicy: IfNotPresent
      ports:
        - containerPort: 8080
      command: ["python3", "-c"]
      args:
        - |
          import http.server, urllib.parse
          for name, body in {
              "welcome.txt": "Welcome to the Internal Document Portal v2.1",
              "readme.txt": "Internal use only. Do not distribute.",
              "changelog.txt": "v2.1 - added document read endpoint",
          }.items():
              open(name, "w").write(body)

          class H(http.server.BaseHTTPRequestHandler):
              def do_GET(self):
                  u = urllib.parse.urlparse(self.path)
                  if u.path == "/read":
                      q = urllib.parse.parse_qs(u.query)
                      fname = q.get("file", [""])[0]
                      # VULNERABILITY: no path validation / sanitization
                      data = open(fname, "rb").read()
                      self.send_response(200); self.end_headers(); self.wfile.write(data)
                  else:
                      self.send_response(200); self.end_headers()
                      self.wfile.write(b"<h1>Internal Document Portal v2.1</h1>"
                                       b"<a href='/read?file=welcome.txt'>welcome.txt</a>")

          http.server.HTTPServer(("0.0.0.0", 8080), H).serve_forever()
